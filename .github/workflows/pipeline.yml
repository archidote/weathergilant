name: Build
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  deploy:
    runs-on: ubuntu-latest 
    steps : 
      - name : Install private SSH Key 
        uses : shimataro/ssh-key-action@v2 
        with : 
          key : ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts : ${{ secrets.SSH_KNOW_HOST }}
          config : ${{ secrets.CONFIG }}
          if_key_exists: fail 
      - name : Pull
        run : | 
          ssh geoffrey@141.94.77.149 '/usr/bin/nohup /usr/bin/kill -9 $(/usr/bin/pgrep -f index.py) > /dev/null 2>&1 &'
          ssh geoffrey@141.94.77.149 '
          cd /home/geoffrey/weathergilannt
          /usr/bin/git pull origin main 
          /usr/bin/nohup /usr/bin/python3 /home/geoffrey/weathergilannt/index.py > /dev/null 2>&1 &'